experiment:
  dataset: fashion_mnist
  model: mlp
  method: fedavg
  scenario: fashion_mnist_dirichlet_0.3
  partition: dirichlet
  alpha: 0.3
  seed: 1
  num_clients: 20
  participants_per_round: 5
  rounds: 100
  local_epochs: 1
  batch_size: 32
  test_batch_size: 256
  lr: 0.01
  momentum: 0.9
  mu: 0.01
  gamma: 1.0
  eta: 1.0
  rho: 1.0
  epsilon: 0.001
  beta_mode: beta
  beta_window: current
  beta_window_size: 5
  probe_batch_size: 32
  oui_layer: penultimate_preact
  device: cpu
  data_root: data
  output_root: descargas_fmnist_mlp
  download: true
  save_every_round: true
